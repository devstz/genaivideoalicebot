services:
  db:
    image: postgres:15-alpine
    container_name: genaivideo_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-+QrGoVAZNb9t7lN6Tm95yQ==}
      POSTGRES_DB: ${POSTGRES_DB:-genaivideo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - genaivideo_network

  # bot_api: TOKEN в .env задаёт бота; @username для QR/2FA/UTM берётся из Telegram getMe (кеш процесса).
  # BOT_USERNAME в .env — только fallback, если getMe недоступен.
  bot_api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: genaivideo_bot_api
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - genaivideo_network

  frontend:
    build:
      context: ../genweb
      dockerfile: Dockerfile
    container_name: genaivideo_frontend
    restart: always
    depends_on:
      - bot_api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # ВАЖНО: 
      # 1. Для запросов СЕРВЕР -> АПИ (SSR) используем имя контейнера: http://bot_api:8000
      - API_URL=http://bot_api:8000
      # 2. Для запросов БРАУЗЕР -> АПИ (Client) используем внешний IP/домен вашего сервера
      - NEXT_PUBLIC_API_URL=http://147.45.147.39:8000
    networks:
      - genaivideo_network

networks:
  genaivideo_network:
    driver: bridge

volumes:
  postgres_data:
